<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>虚拟拥抱 · 情绪超市</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
        }

        body {
            background: radial-gradient(circle at 30% 20%, #0A0A0A, #000000);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Roboto', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            padding: 16px;
        }

        .card {
            max-width: 500px;
            width: 100%;
            background: rgba(20, 20, 30, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            border: 1px solid rgba(255, 16, 240, 0.4);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 20px rgba(255, 16, 240, 0.2);
            padding: 32px 24px;
            text-align: center;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card.pulse {
            transform: scale(1.01);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.6), 0 0 40px rgba(255, 16, 240, 0.5);
        }

        /* 拥抱图形容器 */
        .hug-shape {
            position: relative;
            height: 160px;
            margin-bottom: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 使用多层不规则圆模拟有机体 */
        .blob-left, .blob-right {
            position: absolute;
            width: 110px;
            height: 110px;
            border-radius: 60% 40% 50% 50% / 45% 50% 50% 55%;
            filter: blur(18px);
            transition: all 0.1s ease;
        }

        .blob-left {
            background: radial-gradient(circle at 30% 40%, #FF10F0, #8800CC);
            left: 30%;
            transform: rotate(10deg);
        }

        .blob-right {
            background: radial-gradient(circle at 70% 60%, #00FFFF, #0066AA);
            right: 30%;
            transform: rotate(-8deg);
        }

        /* 拥抱时的不规则运动 */
        .hug-animation .blob-left {
            animation: organicLeft 5s cubic-bezier(0.4, 0.0, 0.2, 1) forwards;
        }
        .hug-animation .blob-right {
            animation: organicRight 5s cubic-bezier(0.4, 0.0, 0.2, 1) forwards;
        }

        @keyframes organicLeft {
            0% {
                transform: translateX(0) rotate(10deg) scale(1);
                filter: blur(18px);
                border-radius: 60% 40% 50% 50% / 45% 50% 50% 55%;
            }
            30% {
                transform: translateX(15px) rotate(15deg) scale(1.2);
                filter: blur(28px);
                border-radius: 55% 45% 45% 55% / 50% 40% 60% 50%;
            }
            70% {
                transform: translateX(10px) rotate(8deg) scale(1.15);
                filter: blur(25px);
                border-radius: 65% 35% 50% 50% / 40% 55% 45% 60%;
            }
            100% {
                transform: translateX(12px) rotate(12deg) scale(1.1);
                filter: blur(22px);
                border-radius: 58% 42% 52% 48% / 47% 53% 47% 53%;
            }
        }

        @keyframes organicRight {
            0% {
                transform: translateX(0) rotate(-8deg) scale(1);
                filter: blur(18px);
                border-radius: 40% 60% 50% 50% / 55% 45% 55% 45%;
            }
            30% {
                transform: translateX(-15px) rotate(-12deg) scale(1.2);
                filter: blur(28px);
                border-radius: 45% 55% 55% 45% / 40% 50% 50% 60%;
            }
            70% {
                transform: translateX(-10px) rotate(-6deg) scale(1.15);
                filter: blur(25px);
                border-radius: 35% 65% 50% 50% / 60% 40% 60% 40%;
            }
            100% {
                transform: translateX(-12px) rotate(-10deg) scale(1.1);
                filter: blur(22px);
                border-radius: 42% 58% 48% 52% / 53% 47% 53% 47%;
            }
        }

        /* 中间渗透的光晕 */
        .bleed-glow {
            position: absolute;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, #FFD700, #FF10F0, transparent);
            border-radius: 50%;
            filter: blur(32px);
            opacity: 0.3;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.2s;
        }

        .hug-animation .bleed-glow {
            animation: bleed 5s ease-in-out forwards;
        }

        @keyframes bleed {
            0% { opacity: 0.2; transform: translate(-50%, -50%) scale(0.8); filter: blur(32px);}
            40% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.8); filter: blur(28px);}
            80% { opacity: 0.5; transform: translate(-50%, -50%) scale(1.3); filter: blur(35px);}
            100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1.1); filter: blur(32px);}
        }

        h1 {
            font-family: 'KaiTi', '华文行书', cursive;
            font-size: 38px;
            font-weight: 400;
            background: linear-gradient(135deg, #FFD700, #FF10F0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
        }

        .status-text {
            font-size: 20px;
            color: #E0E0E0;
            margin: 16px 0;
            font-weight: 300;
        }

        .countdown {
            font-size: 72px;
            font-weight: 800;
            font-family: 'Courier New', monospace;
            color: #00FFFF;
            text-shadow: 0 0 20px #00FFFF;
            margin: 16px 0;
            animation: countdownPop 0.4s ease-out;
        }

        @keyframes countdownPop {
            0% { transform: scale(0.8); opacity: 0; }
            80% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }

        .button {
            background: linear-gradient(135deg, #FF10F0, #8800CC);
            border: none;
            color: #FFF;
            font-size: 18px;
            font-weight: 500;
            padding: 14px 28px;
            border-radius: 60px;
            cursor: pointer;
            margin: 12px 8px;
            transition: transform 0.1s, box-shadow 0.2s;
            box-shadow: 0 8px 20px rgba(255, 16, 240, 0.3);
        }

        .button-outline {
            background: transparent;
            border: 2px solid #FF10F0;
            color: #FF10F0;
            box-shadow: none;
        }

        .button:active {
            transform: scale(0.96);
        }

        .small-note {
            font-size: 12px;
            color: #AAA;
            margin-top: 20px;
            border-top: 1px solid #333;
            padding-top: 16px;
        }

        .button-group {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .quote {
            font-size: 18px;
            color: #FFD700;
            font-style: italic;
            background: rgba(255, 16, 240, 0.12);
            padding: 16px;
            border-radius: 40px;
            margin: 20px 0;
            border-left: 4px solid #FF10F0;
            font-family: 'KaiTi', cursive;
            transition: all 0.3s ease;
        }

        .quote-glow {
            text-shadow: 0 0 8px #FFD700;
            transform: scale(1.02);
        }

        .ios-tip {
            background: rgba(255, 94, 0, 0.12);
            border-left: 3px solid #FF5E00;
            padding: 10px 14px;
            border-radius: 20px;
            margin-bottom: 20px;
            font-size: 12px;
            color: #FFD0A0;
            text-align: left;
        }
    </style>
</head>
<body>
<div class="card" id="app">
    <div class="ios-tip">
        📱 iPhone 用户：设备不支持振动，但动效同样温暖。<br>
        🤗 Android 用户：点击后请握紧手机，感受拥抱。
    </div>

    <div class="hug-shape" id="hugShape">
        <div class="blob-left"></div>
        <div class="blob-right"></div>
        <div class="bleed-glow"></div>
    </div>

    <h1>虚拟拥抱传送终端</h1>
    <div class="status-text" id="statusMsg">一位陌生人正在等待...</div>

    <div id="mainContent">
        <button class="button" id="allowBtn">✨ 接收拥抱 ✨</button>
        <div class="small-note">* 拥抱将消耗 1 脆弱券（虚拟）<br>* 点击后等待 3 秒，拥抱持续 5 秒</div>
    </div>
    <div class="small-note" style="margin-top: 12px;">🔒 情绪数据已加密 · 拥抱来自 #EM-CLOUD-01</div>
</div>

<script>
    let countingDown = false;
    let vibrationAllowed = false;
    const hugShape = document.getElementById('hugShape');
    const statusMsg = document.getElementById('statusMsg');
    const mainContent = document.getElementById('mainContent');
    const card = document.querySelector('.card');

    function startVibration() {
        if (!vibrationAllowed) return;
        if (navigator.vibrate) {
            navigator.vibrate([200, 50, 4750]);
        }
    }

    function startVisualHug() {
        card.classList.add('pulse');
        hugShape.classList.add('hug-animation');
        setTimeout(() => {
            card.classList.remove('pulse');
            hugShape.classList.remove('hug-animation');
        }, 5000);
    }

    function showHuggingUI() {
        mainContent.innerHTML = `
            <div class="status-text">正在发送虚拟拥抱...</div>
            <div class="countdown" id="countdownNum">3</div>
            <div class="small-note">请注视屏幕，感受温暖</div>
        `;
        const countEl = document.getElementById('countdownNum');
        if (countEl) {
            countEl.style.animation = 'none';
            countEl.offsetHeight;
            countEl.style.animation = 'countdownPop 0.4s ease-out';
        }
    }

    function showCompleteUI() {
        mainContent.innerHTML = `
            <div class="quote" id="quoteMsg">“它来自0和1，<br>但温暖是真实的吗？”</div>
            <div class="button-group">
                <button class="button" id="againBtn">🫂 再抱一次</button>
                <button class="button button-outline" id="shareBtn">📤 分享给朋友</button>
            </div>
            <div class="small-note">* 如需真实拥抱，请前往“真实脆弱体验券”区域</div>
        `;
        statusMsg.innerText = '拥抱已送达！';
        const quoteEl = document.getElementById('quoteMsg');
        if (quoteEl) {
            quoteEl.classList.add('quote-glow');
            setTimeout(() => quoteEl.classList.remove('quote-glow'), 800);
        }
        document.getElementById('againBtn').addEventListener('click', startHug);
        document.getElementById('shareBtn').addEventListener('click', shareHug);
    }

    function startHug() {
        if (countingDown) return;
        countingDown = true;
        showHuggingUI();
        let count = 3;
        const countdownEl = document.getElementById('countdownNum');
        const interval = setInterval(() => {
            count--;
            if (countdownEl) {
                countdownEl.innerText = count;
                countdownEl.style.animation = 'none';
                countdownEl.offsetHeight;
                countdownEl.style.animation = 'countdownPop 0.4s ease-out';
            }
            if (count === 0) {
                clearInterval(interval);
                startVisualHug();
                startVibration();
                setTimeout(() => {
                    showCompleteUI();
                    countingDown = false;
                }, 5000);
            }
        }, 1000);
    }

    function shareHug() {
        if (navigator.share) {
            navigator.share({
                title: '虚拟拥抱体验券',
                text: '我刚收到一个虚拟拥抱，你也来试试？',
                url: window.location.href,
            }).catch(() => {});
        } else {
            navigator.clipboard.writeText(window.location.href);
            alert('链接已复制，可以分享给朋友了');
        }
    }

    document.getElementById('allowBtn').addEventListener('click', () => {
        if (navigator.vibrate) {
            navigator.vibrate(50);
            vibrationAllowed = true;
        } else {
            vibrationAllowed = false;
        }
        startHug();
    });

    let meta = document.createElement('meta');
    meta.name = "theme-color";
    meta.content = "#0A0A0A";
    document.head.appendChild(meta);
</script>
</body>
</html>
