<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>虚拟拥抱传送终端 - 情绪超市</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #0A0A0A;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 20px;
        }

        /* 卡片容器 */
        .card {
            max-width: 480px;
            width: 100%;
            background: #1A1A1A;
            border-radius: 32px;
            border: 1px solid rgba(255, 16, 240, 0.3);
            box-shadow: 0 0 30px rgba(255, 16, 240, 0.2);
            padding: 32px 24px;
            text-align: center;
            backdrop-filter: blur(4px);
        }

        /* 心形图标容器 */
        .heart-container {
            margin-bottom: 24px;
        }

        .heart {
            font-size: 80px;
            display: inline-block;
            animation: pulse 1.2s ease-in-out infinite;
            filter: drop-shadow(0 0 12px #FF10F0);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.12); opacity: 1; text-shadow: 0 0 20px #FF10F0; }
        }

        /* 分裂融合动画 */
        .heart-split {
            animation: splitFuse 1.5s ease-in-out forwards;
        }

        @keyframes splitFuse {
            0% { transform: scale(1); opacity: 1; letter-spacing: 0; }
            30% { transform: scale(1.3); letter-spacing: 20px; opacity: 0.8; }
            70% { transform: scale(0.9); letter-spacing: -10px; opacity: 1; }
            100% { transform: scale(1); letter-spacing: 0; }
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #FF10F0, #00FFFF);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }

        .status-text {
            font-size: 18px;
            color: #F0F0F0;
            margin: 20px 0;
            line-height: 1.4;
        }

        .countdown {
            font-size: 72px;
            font-weight: 800;
            font-family: 'Fira Code', monospace;
            color: #00FFFF;
            text-shadow: 0 0 15px #00FFFF;
            margin: 20px 0;
            letter-spacing: 4px;
        }

        .button {
            background: #FF10F0;
            border: none;
            color: #0A0A0A;
            font-size: 18px;
            font-weight: 700;
            padding: 14px 28px;
            border-radius: 60px;
            cursor: pointer;
            margin: 12px 8px;
            transition: all 0.2s ease;
            box-shadow: 0 0 12px rgba(255, 16, 240, 0.5);
        }

        .button-outline {
            background: transparent;
            border: 1.5px solid #FF10F0;
            color: #FF10F0;
            box-shadow: none;
        }

        .button:hover {
            transform: scale(1.02);
            filter: brightness(1.05);
        }

        .small-note {
            font-size: 12px;
            color: #888;
            margin-top: 24px;
            border-top: 1px solid #333;
            padding-top: 20px;
        }

        .button-group {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        .quote {
            font-size: 16px;
            color: #FFD700;
            font-style: italic;
            background: rgba(255, 16, 240, 0.08);
            padding: 16px;
            border-radius: 20px;
            margin: 20px 0;
            border-left: 3px solid #FF10F0;
            text-align: left;
        }
    </style>
</head>
<body>
<div class="card" id="app">
    <div class="heart-container">
        <div class="heart" id="heartIcon">❤️</div>
    </div>
    <h1>虚拟拥抱传送终端</h1>
    <div class="status-text" id="statusMsg">一位陌生人正在等待...</div>

    <div id="mainContent">
        <button class="button" id="allowBtn">✨ 允许振动并接收拥抱 ✨</button>
        <div class="small-note">* 拥抱将消耗1脆弱券（虚拟）<br>* 需要您的手机支持振动功能</div>
    </div>
    <div class="small-note" style="margin-top: 16px;">
        🔒 您的情绪数据已匿名加密<br>
        拥抱来自 #EM-CLOUD-01
    </div>
</div>

<script>
    let vibrationAllowed = false;
    let countingDown = false;
    const app = document.getElementById('app');
    const heartIcon = document.getElementById('heartIcon');
    const statusMsg = document.getElementById('statusMsg');
    const mainContent = document.getElementById('mainContent');

    // 振动兼容处理
    function vibrate(duration) {
        if (vibrationAllowed && navigator.vibrate) {
            navigator.vibrate(duration);
        } else {
            console.log('振动未授权或不支持');
        }
    }

    // 显示拥抱中界面
    function showHuggingUI() {
        mainContent.innerHTML = `
            <div class="status-text">正在发送虚拟拥抱...</div>
            <div class="countdown" id="countdownNum">3</div>
            <div class="small-note">请握住手机，感受振动</div>
        `;
        heartIcon.style.animation = 'none';
        heartIcon.offsetHeight;
        heartIcon.style.animation = 'pulse 0.6s ease-in-out infinite';
    }

    // 显示完成界面
    function showCompleteUI() {
        heartIcon.classList.add('heart-split');
        setTimeout(() => {
            heartIcon.classList.remove('heart-split');
        }, 1500);
        
        mainContent.innerHTML = `
            <div class="quote" id="quoteMsg">
                “它来自0和1，<br>但温度是真实的吗？”
            </div>
            <div class="button-group">
                <button class="button" id="againBtn">🫂 再抱一次</button>
                <button class="button button-outline" id="shareBtn">📤 分享给朋友</button>
            </div>
            <div class="small-note">* 如需真实拥抱，请前往“真实脆弱体验券”区域</div>
        `;
        statusMsg.innerText = '拥抱已送达！';
        
        document.getElementById('againBtn').addEventListener('click', startHug);
        document.getElementById('shareBtn').addEventListener('click', shareHug);
    }

    // 开始拥抱倒计时+振动
    function startHug() {
        if (countingDown) return;
        countingDown = true;
        
        showHuggingUI();
        
        let count = 3;
        const countdownEl = document.getElementById('countdownNum');
        
        const interval = setInterval(() => {
            count--;
            if (countdownEl) countdownEl.innerText = count;
            // 每秒轻微振动提示
            if (count > 0) vibrate(100);
            
            if (count === 0) {
                clearInterval(interval);
                // 主振动3秒
                vibrate(3000);
                setTimeout(() => {
                    showCompleteUI();
                    countingDown = false;
                }, 3100);
            }
        }, 1000);
    }

    // 请求振动权限（部分浏览器需要用户交互）
    function requestVibration() {
        // 大多数移动端浏览器不需要显式请求，直接调用即可
        // 但为了体验，先测试一次微小振动
        if (navigator.vibrate) {
            navigator.vibrate(50);
            vibrationAllowed = true;
            startHug();
        } else {
            alert('您的浏览器不支持振动API，但拥抱仍会发送（无振动）');
            vibrationAllowed = false;
            startHug();
        }
    }

    // 分享功能
    function shareHug() {
        if (navigator.share) {
            navigator.share({
                title: '虚拟拥抱体验券',
                text: '我刚收到一个虚拟拥抱，你也来试试？',
                url: window.location.href,
            }).catch(() => {});
        } else {
            // 降级复制链接
            navigator.clipboard.writeText(window.location.href);
            alert('链接已复制，可以分享给朋友了');
        }
    }

    // 初始化按钮事件
    document.getElementById('allowBtn').addEventListener('click', requestVibration);
    
    // 自动适配深色模式状态栏
    let meta = document.createElement('meta');
    meta.name = "theme-color";
    meta.content = "#0A0A0A";
    document.head.appendChild(meta);
</script>
</body>
</html>
