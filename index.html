<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>虚拟拥抱 · 情绪超市</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 20%, #0A0A0A, #000000);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Roboto', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            padding: 20px;
        }

        /* 卡片容器 */
        .card {
            max-width: 520px;
            width: 100%;
            background: rgba(20, 20, 30, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 64px;
            border: 1px solid rgba(255, 16, 240, 0.4);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 20px rgba(255, 16, 240, 0.2);
            padding: 48px 32px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        /* 拥抱时卡片轻微脉动（柔和） */
        .card.pulse {
            transform: scale(1.01);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.6), 0 0 30px rgba(255, 16, 240, 0.3);
        }

        /* 几何图形容器 */
        .geo-container {
            position: relative;
            height: 180px;
            margin-bottom: 32px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 两个融合的圆形（代表拥抱） */
        .circle-left {
            position: absolute;
            width: 110px;
            height: 110px;
            background: radial-gradient(circle, #FF10F0, #8800CC);
            border-radius: 50%;
            filter: blur(18px);
            opacity: 0.7;
            left: 35%;
            transition: all 0.1s linear;
        }

        .circle-right {
            position: absolute;
            width: 110px;
            height: 110px;
            background: radial-gradient(circle, #00FFFF, #0066AA);
            border-radius: 50%;
            filter: blur(18px);
            opacity: 0.7;
            right: 35%;
            transition: all 0.1s linear;
        }

        /* 拥抱动画：5秒内两个圆缓慢融合并放大 */
        .hug-animation .circle-left {
            animation: hugLeft 5s ease-in-out forwards;
        }
        .hug-animation .circle-right {
            animation: hugRight 5s ease-in-out forwards;
        }

        @keyframes hugLeft {
            0% {
                transform: translateX(0) scale(1);
                filter: blur(18px);
                opacity: 0.7;
            }
            50% {
                transform: translateX(20px) scale(1.3);
                filter: blur(28px);
                opacity: 0.9;
            }
            100% {
                transform: translateX(15px) scale(1.2);
                filter: blur(25px);
                opacity: 0.8;
            }
        }

        @keyframes hugRight {
            0% {
                transform: translateX(0) scale(1);
                filter: blur(18px);
                opacity: 0.7;
            }
            50% {
                transform: translateX(-20px) scale(1.3);
                filter: blur(28px);
                opacity: 0.9;
            }
            100% {
                transform: translateX(-15px) scale(1.2);
                filter: blur(25px);
                opacity: 0.8;
            }
        }

        /* 中心光晕，拥抱时缓慢扩大再收回 */
        .center-glow {
            position: absolute;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, #FFD700, transparent);
            border-radius: 50%;
            filter: blur(30px);
            opacity: 0.4;
            transition: all 0.1s linear;
        }

        .hug-animation .center-glow {
            animation: glowPulse 5s ease-in-out forwards;
        }

        @keyframes glowPulse {
            0% {
                transform: scale(1);
                opacity: 0.4;
                filter: blur(30px);
            }
            50% {
                transform: scale(2.2);
                opacity: 0.8;
                filter: blur(20px);
            }
            100% {
                transform: scale(1.5);
                opacity: 0.5;
                filter: blur(25px);
            }
        }

        h1 {
            font-family: 'KaiTi', '华文行书', 'Segoe UI', cursive;
            font-size: 48px;
            font-weight: 400;
            background: linear-gradient(135deg, #FFD700, #FF10F0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 16px;
            letter-spacing: 2px;
        }

        .status-text {
            font-size: 22px;
            color: #E0E0E0;
            margin: 20px 0;
            line-height: 1.4;
            font-weight: 300;
        }

        .countdown {
            font-size: 88px;
            font-weight: 800;
            font-family: 'Courier New', monospace;
            color: #00FFFF;
            text-shadow: 0 0 20px #00FFFF;
            margin: 24px 0;
            letter-spacing: 8px;
        }

        .button {
            background: linear-gradient(135deg, #FF10F0, #8800CC);
            border: none;
            color: #FFFFFF;
            font-size: 20px;
            font-weight: 500;
            padding: 16px 32px;
            border-radius: 60px;
            cursor: pointer;
            margin: 12px 8px;
            transition: all 0.2s ease;
            box-shadow: 0 8px 20px rgba(255, 16, 240, 0.3);
            font-family: inherit;
        }

        .button-outline {
            background: transparent;
            border: 2px solid #FF10F0;
            color: #FF10F0;
            box-shadow: none;
        }

        .button:active {
            transform: scale(0.96);
        }

        .small-note {
            font-size: 13px;
            color: #AAAAAA;
            margin-top: 28px;
            border-top: 1px solid #333;
            padding-top: 24px;
            line-height: 1.5;
        }

        .button-group {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-top: 24px;
        }

        .quote {
            font-size: 20px;
            color: #FFD700;
            font-style: italic;
            background: rgba(255, 16, 240, 0.08);
            padding: 20px;
            border-radius: 48px;
            margin: 24px 0;
            border-left: 4px solid #FF10F0;
            text-align: center;
            font-family: 'KaiTi', cursive;
            line-height: 1.5;
        }

        /* iOS 提示条 */
        .ios-tip {
            background: rgba(255, 94, 0, 0.15);
            border-left: 3px solid #FF5E00;
            padding: 12px 16px;
            border-radius: 24px;
            margin-bottom: 24px;
            font-size: 14px;
            color: #FFD0A0;
            text-align: left;
        }
    </style>
</head>
<body>
<div class="card" id="app">
    <div class="ios-tip">
        📱 如果您是 iPhone 用户，您的设备不支持振动。<br>
        但拥抱的温暖会通过✨ 图形和❤️ 跳动传递给您。
    </div>

    <div class="geo-container" id="geoContainer">
        <div class="circle-left"></div>
        <div class="circle-right"></div>
        <div class="center-glow"></div>
    </div>

    <h1>虚拟拥抱传送终端</h1>
    <div class="status-text" id="statusMsg">一位陌生人正在等待...</div>

    <div id="mainContent">
        <button class="button" id="allowBtn">✨ 接收拥抱 ✨</button>
        <div class="small-note">
            * 拥抱将消耗 1 脆弱券（虚拟）<br>
            * 点击按钮，感受图形融合与温暖光晕
        </div>
    </div>
    <div class="small-note" style="margin-top: 16px;">
        🔒 您的情绪数据已匿名加密 · 拥抱来自 #EM-CLOUD-01
    </div>
</div>

<script>
    let countingDown = false;
    const geoContainer = document.getElementById('geoContainer');
    const statusMsg = document.getElementById('statusMsg');
    const mainContent = document.getElementById('mainContent');
    const card = document.querySelector('.card');

    // 视觉拥抱效果（柔和版）：几何图形融合动画 + 卡片轻微脉动
    function startVisualHug() {
        // 卡片轻微脉动
        card.classList.add('pulse');
        // 几何图形融合动画
        geoContainer.classList.add('hug-animation');
        
        // 5秒后移除动画和脉动
        setTimeout(() => {
            card.classList.remove('pulse');
            geoContainer.classList.remove('hug-animation');
        }, 5000);
    }

    // 显示拥抱中界面
    function showHuggingUI() {
        mainContent.innerHTML = `
            <div class="status-text">正在发送虚拟拥抱...</div>
            <div class="countdown" id="countdownNum">3</div>
            <div class="small-note">请注视屏幕，感受温暖</div>
        `;
    }

    // 显示完成界面
    function showCompleteUI() {
        mainContent.innerHTML = `
            <div class="quote" id="quoteMsg">
                “它来自0和1，<br>但温暖是真实的吗？”
            </div>
            <div class="button-group">
                <button class="button" id="againBtn">🫂 再抱一次</button>
                <button class="button button-outline" id="shareBtn">📤 分享给朋友</button>
            </div>
            <div class="small-note">* 如需真实拥抱，请前往“真实脆弱体验券”区域</div>
        `;
        statusMsg.innerText = '拥抱已送达！';
        
        document.getElementById('againBtn').addEventListener('click', startHug);
        document.getElementById('shareBtn').addEventListener('click', shareHug);
    }

    // 开始拥抱倒计时 + 视觉反馈
    function startHug() {
        if (countingDown) return;
        countingDown = true;
        
        showHuggingUI();
        
        let count = 3;
        const countdownEl = document.getElementById('countdownNum');
        
        const interval = setInterval(() => {
            count--;
            if (countdownEl) countdownEl.innerText = count;
            
            if (count === 0) {
                clearInterval(interval);
                // 开始5秒拥抱动画
                startVisualHug();
                setTimeout(() => {
                    showCompleteUI();
                    countingDown = false;
                }, 5000); // 等待5秒拥抱动画完成
            }
        }, 1000);
    }

    // 分享功能
    function shareHug() {
        if (navigator.share) {
            navigator.share({
                title: '虚拟拥抱体验券',
                text: '我刚收到一个虚拟拥抱，你也来试试？',
                url: window.location.href,
            }).catch(() => {});
        } else {
            navigator.clipboard.writeText(window.location.href);
            alert('链接已复制，可以分享给朋友了');
        }
    }

    // 初始化按钮事件
    document.getElementById('allowBtn').addEventListener('click', startHug);
    
    // 适配深色模式状态栏
    let meta = document.createElement('meta');
    meta.name = "theme-color";
    meta.content = "#0A0A0A";
    document.head.appendChild(meta);
</script>
</body>
</html>
