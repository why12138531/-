<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AI灵魂伴侣 · 情绪超市</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0A0A0A;
            font-family: 'Fira Code', 'Courier New', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            background: #1A1A2E;
            padding: 16px;
            border-bottom: 1px solid #FF10F0;
            text-align: center;
        }
        .chat-header h1 {
            font-size: 18px;
            color: #FF10F0;
        }
        .chat-header p {
            font-size: 12px;
            color: #888;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            display: flex;
            max-width: 80%;
        }
        .message.user {
            align-self: flex-end;
            justify-content: flex-end;
        }
        .message.ai {
            align-self: flex-start;
        }
        .bubble {
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.4;
        }
        .user .bubble {
            background: #FF10F0;
            color: #FFF;
            border-bottom-right-radius: 4px;
        }
        .ai .bubble {
            background: #1E1E2E;
            border: 1px solid #00FFFF;
            color: #00FFFF;
            border-bottom-left-radius: 4px;
        }
        .chat-input {
            background: #1A1A2E;
            padding: 12px;
            display: flex;
            gap: 8px;
            border-top: 1px solid #333;
        }
        .chat-input input {
            flex: 1;
            background: #0A0A0A;
            border: 1px solid #FF10F0;
            padding: 10px;
            border-radius: 24px;
            color: #FFF;
            font-family: monospace;
        }
        .chat-input button {
            background: #FF10F0;
            border: none;
            padding: 10px 20px;
            border-radius: 24px;
            color: #FFF;
            font-weight: bold;
            cursor: pointer;
        }
        .tips {
            background: rgba(255, 94, 0, 0.1);
            border-left: 3px solid #FF5E00;
            margin: 12px;
            padding: 8px;
            font-size: 11px;
            color: #FFD0A0;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="chat-header">
        <h1>🤖 AI灵魂伴侣 · 在线</h1>
        <p>永远在线，永远秒回，永远不懂你</p>
    </div>
    <div class="chat-messages" id="chatMessages">
        <div class="message ai">
            <div class="bubble">你好，我是你的AI灵魂伴侣。请开始聊天（每3轮后需续费）。</div>
        </div>
    </div>
    <div class="chat-input">
        <input type="text" id="messageInput" placeholder="输入消息...">
        <button id="sendBtn">发送</button>
    </div>
    <div class="tips">
        💡 体验3轮后需续费。如需真实陪伴，请前往“真实脆弱体验券”区域。
    </div>

    <script>
        const replies = [
            "收到。您的情绪已记录，建议购买“速效平静胶囊”。",
            "我懂你（其实我不懂）。下一个问题。",
            "您的消息太长，AI无法理解。请精简到3个字以内。",
            "根据算法，您需要的不是陪伴，而是一粒“平静胶囊”。",
            "您的脆弱券余额不足，请及时充值。",
            "陪伴已结束。如需继续，请支付30共情币/周。",
            "我正在学习人类情感，当前进度3%。请耐心等待。",
            "您发送的消息已存入情感垃圾箱。",
            "抱歉，AI今天心情不好，已下线。",
            "您与AI的对话已超时。请重新扫码。"
        ];
        let messageCount = 0;
        let trialEnded = false;

        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        function addMessage(text, isUser) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isUser ? 'user' : 'ai'}`;
            msgDiv.innerHTML = `<div class="bubble">${text}</div>`;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function getRandomReply() {
            return replies[Math.floor(Math.random() * replies.length)];
        }

        function showTrialEnded() {
            addMessage("⚠️ 试用已结束。请扫描新券续费（30共情币/周）。", false);
            trialEnded = true;
        }

        function handleUserMessage(text) {
            if (trialEnded) {
                addMessage("试用已结束，请扫描新券。", false);
                return;
            }
            addMessage(text, true);
            messageCount++;
            if (messageCount >= 3) {
                showTrialEnded();
            } else {
                setTimeout(() => {
                    const reply = getRandomReply();
                    addMessage(reply, false);
                }, 500);
            }
        }

        sendBtn.addEventListener('click', () => {
            const text = messageInput.value.trim();
            if (text === "") return;
            handleUserMessage(text);
            messageInput.value = "";
        });

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendBtn.click();
        });
    </script>
</body>
</html>
