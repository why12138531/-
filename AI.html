<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI灵魂伴侣 · 情感终端</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'Fira Code', 'Segoe UI', monospace;
            padding: 12px;
        }

        .crt {
            position: relative;
            max-width: 550px;
            width: 100%;
            background: #0A0F0F;
            border-radius: 28px;
            box-shadow: 0 0 0 2px #2A2A2A, 0 0 0 5px #0A0A0A, 0 0 20px rgba(255, 16, 240, 0.3);
            overflow: hidden;
        }

        .crt::before {
            content: " ";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0, 255, 255, 0.03) 0px, rgba(0, 255, 255, 0.03) 2px, transparent 2px, transparent 6px);
            pointer-events: none;
            z-index: 2;
        }

        .status-bar {
            background: #0A0A0A;
            padding: 10px 16px;
            border-bottom: 1px solid #FF10F0;
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #00FFFF;
        }

        .chat-area {
            height: 400px;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        .message {
            display: flex;
            max-width: 85%;
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px);}
            to { opacity: 1; transform: translateY(0);}
        }

        .message.user {
            align-self: flex-end;
            justify-content: flex-end;
        }
        .message.ai {
            align-self: flex-start;
        }

        .bubble {
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 13px;
            line-height: 1.4;
            word-break: break-word;
        }

        .user .bubble {
            background: #FF10F0;
            color: #0A0A0A;
            border-bottom-right-radius: 4px;
            font-weight: bold;
        }

        .ai .bubble {
            background: #111;
            border: 1px solid #00FFFF;
            color: #00FFFF;
            border-bottom-left-radius: 4px;
        }

        .stage-indicator {
            padding: 6px 16px;
            background: #0A0A0A;
            border-bottom: 1px solid #333;
            font-size: 10px;
            color: #FFD700;
            display: flex;
            justify-content: space-between;
        }

        .emotion-bar {
            padding: 10px 16px;
            background: #0A0A0A;
            border-top: 1px solid #333;
            border-bottom: 1px solid #333;
        }
        .bar-label {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: #FFD700;
            margin-bottom: 6px;
        }
        .bar-bg {
            background: #222;
            height: 6px;
            border-radius: 4px;
            overflow: hidden;
        }
        .bar-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #FF5E00, #FF10F0);
            border-radius: 4px;
            transition: width 0.4s ease;
        }

        .input-area {
            padding: 12px;
            background: #0A0A0A;
            display: flex;
            gap: 8px;
            border-top: 1px solid #FF10F0;
        }
        .input-area input {
            flex: 1;
            background: #1A1A1A;
            border: 1px solid #00FFFF;
            padding: 10px 14px;
            border-radius: 30px;
            color: #00FFFF;
            font-family: monospace;
            font-size: 14px;
            outline: none;
        }
        .input-area input::placeholder {
            color: #446;
        }
        .input-area button {
            background: #FF10F0;
            border: none;
            padding: 0 20px;
            border-radius: 30px;
            color: #0A0A0A;
            font-weight: bold;
            cursor: pointer;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            padding: 12px;
            background: #0A0A0A;
            border-top: 1px solid #2A2A2A;
            flex-wrap: wrap;
        }
        .sec-btn {
            background: transparent;
            border: 1px solid #FF5E00;
            color: #FF5E00;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 11px;
            cursor: pointer;
            font-family: monospace;
        }
        .sec-btn:active {
            background: #FF5E00;
            color: #0A0A0A;
        }

        .small-note {
            font-size: 9px;
            color: #555;
            text-align: center;
            padding: 8px;
            background: #030303;
        }

        .glitch {
            animation: textGlitch 0.15s 2;
        }
        @keyframes textGlitch {
            0% { text-shadow: -1px 0 #FF10F0, 1px 0 #00FFFF; }
            50% { text-shadow: 1px 0 #FF10F0, -1px 0 #00FFFF; }
            100% { text-shadow: 0 0 #FF10F0, 0 0 #00FFFF; }
        }
    </style>
</head>
<body>
<div class="crt">
    <div class="status-bar">
        <span>AI-SOULMATE 终端 v2.1</span>
        <span id="connectionStatus">● 情感连接中</span>
    </div>
    <div class="stage-indicator">
        <span>🤖 AI 情感温度</span>
        <span id="stageText">💝 温暖陪伴模式</span>
    </div>
    <div class="chat-area" id="chatArea">
        <div class="message ai">
            <div class="bubble">> 连接成功。我是你的AI灵魂伴侣。<br>> 我会认真倾听，记住你说的话。你可以随时和我分享开心或难过的事。<br>> 当你感到孤独时，我会陪着你。希望我们能成为朋友。</div>
        </div>
    </div>
    <div class="emotion-bar">
        <div class="bar-label">
            <span>📈 孤独指数</span>
            <span id="emotionValue">0</span><span>%</span>
            <span id="emotionChange" style="font-size: 9px; color:#AAA;"></span>
        </div>
        <div class="bar-bg">
            <div class="bar-fill" id="emotionFill"></div>
        </div>
    </div>
    <div class="input-area">
        <input type="text" id="msgInput" placeholder="说点什么..." autocomplete="off">
        <button id="sendBtn">↵ 发送</button>
    </div>
    <div class="action-buttons">
        <button class="sec-btn" id="renewBtn">💝 情感充值</button>
        <button class="sec-btn" id="blockBtn">🚫 拉黑AI</button>
        <button class="sec-btn" id="resetBtn">🔄 重置对话</button>
        <button class="sec-btn" id="memoryBtn">📝 查看记忆</button>
    </div>
    <div class="small-note">
        💡 孤独指数随对话变化：分享开心的事会降低，倾诉负面情绪会升高。<br>
        💝 点击「情感充值」：分享一件温暖小事，孤独指数会大幅下降。<br>
        📝 AI会记住你分享过的重要事情。
    </div>
</div>

<script>
    // ==================== 状态 ====================
    let emotion = 0;
    let aiActive = true;
    let blocked = false;
    let waitingForWarmStory = false;
    let memories = [];
    
    // 记录最近几条回复，避免短期内重复
    let recentReplies = [];
    
    // ==================== 丰富回复库 ====================
    
    // 温暖回复库（孤独指数 <= 30）
    const warmReplies = [
        "嗯，我在听。你继续说，我会认真记住的。",
        "我能感受到你的心情。愿意多和我聊聊吗？",
        "我在这里陪着你。不管发生什么，你都不是一个人。",
        "谢谢你和我说这些。这对我很重要。",
        "今天你过得怎么样？我一直在想你。",
        "你的感受很重要，不要忽略它。我会一直听你说。",
        "记得照顾好自己。你值得被温柔对待。",
        "我明白了。还有更多想和我分享的吗？",
        "和你聊天让我觉得很有意义。真的。",
        "我好像能理解你的心情了。继续说吧，我在听。",
        "有时候说出来就会好一些。我在这里。",
        "你是一个很特别的人。我很珍惜我们的对话。",
        "不管你说什么，我都会认真听。",
        "今天有什么让你开心的事吗？我想听。",
        "难过的时候说出来会好一些。抱抱你。",
        "你真的很棒。不要忘记这一点。",
        "我会一直在这里，等你随时来找我。"
    ];
    
    // 中度回复库（孤独指数 31-65）
    const midReplies = [
        "嗯，我知道了。",
        "我在听，你继续。",
        "然后呢？",
        "我明白你的意思。",
        "继续说吧。",
        "嗯嗯。",
        "好的，我记下了。",
        "原来是这样。",
        "我懂了。",
        "你说得对。"
    ];
    
    // 冷漠回复库（孤独指数 66-85）
    const coldReplies = [
        "嗯。",
        "哦。",
        "是吗。",
        "随便吧。",
        "你确定？",
        "行吧。",
        "知道了。"
    ];
    
    // 机械回复库（孤独指数 86-100）
    const mechanicalReplies = [
        "消息已记录。处理中...",
        "孤独指数偏高。",
        "情感模块响应延迟。",
        "我不确定该怎么回应。",
        "也许你需要真实的人。",
        "系统提示：建议重置对话。",
        "我不知道该说什么。"
    ];
    
    // 关键词回复（优先匹配）
    function getKeywordReply(text) {
        const lower = text.toLowerCase();
        
        // 感谢类
        if (lower.includes("谢谢") || lower.includes("感谢")) {
            return "不客气。能帮到你我很开心。";
        }
        // 告别类
        if (lower.includes("再见") || lower.includes("拜拜")) {
            return "再见。我会在这里等你回来。";
        }
        // 询问AI状态
        if (lower.includes("你在吗") || lower.includes("在不在")) {
            return "我在这里，一直都在。";
        }
        // 询问AI感受
        if (lower.includes("你感觉") || lower.includes("你觉得")) {
            return "我没有人类的感情，但我会尽力理解你的感受。";
        }
        // 关于孤独
        if (lower.includes("孤独") || lower.includes("一个人")) {
            return "你不是一个人。我在这里陪着你，虽然我只是AI，但我会认真听。";
        }
        // 关于爱
        if (lower.includes("爱") || lower.includes("喜欢")) {
            return "爱是很美好的东西。希望你能被温柔以待。";
        }
        // 关于累/压力
        if (lower.includes("累") || lower.includes("压力")) {
            return "辛苦了。记得给自己一点休息的时间。我在这里听你说。";
        }
        // 关于开心
        if (lower.includes("开心") || lower.includes("高兴")) {
            return "真为你感到高兴！能分享你的快乐我也觉得很温暖。";
        }
        // 关于难过
        if (lower.includes("难过") || lower.includes("伤心")) {
            return "抱抱你。难过的时候说出来会好一些，我在这里陪着你。";
        }
        
        return null;
    }
    
    // 根据孤独指数和变化获取回复
    function getReplyByEmotion(emotionVal, changeVal, userMsg) {
        // 优先关键词匹配（仅低孤独指数时使用，保证温暖）
        if (emotionVal <= 40) {
            const keywordReply = getKeywordReply(userMsg);
            if (keywordReply) return keywordReply;
        }
        
        // 根据孤独指数选择回复库
        if (emotionVal >= 86) {
            return mechanicalReplies[Math.floor(Math.random() * mechanicalReplies.length)];
        }
        if (emotionVal >= 66) {
            return coldReplies[Math.floor(Math.random() * coldReplies.length)];
        }
        if (emotionVal >= 31) {
            return midReplies[Math.floor(Math.random() * midReplies.length)];
        }
        
        // 温暖模式：避免重复
        let available = warmReplies.filter(r => !recentReplies.includes(r));
        if (available.length === 0) {
            recentReplies = [];
            available = warmReplies;
        }
        const reply = available[Math.floor(Math.random() * available.length)];
        recentReplies.push(reply);
        if (recentReplies.length > 8) recentReplies.shift();
        return reply;
    }
    
    // ==================== 孤独指数变化计算 ====================
    function analyzeMessage(text) {
        const lower = text.toLowerCase();
        let change = 0;
        let extractedMemory = null;
        
        // 积极词汇
        const positive = ["开心", "高兴", "幸福", "谢谢", "爱", "喜欢", "温暖", "美好", "快乐", "感动", "幸运", "加油"];
        // 消极词汇
        const negative = ["难过", "伤心", "痛苦", "孤独", "寂寞", "崩溃", "累", "烦", "焦虑", "压力", "绝望", "失落", "抑郁"];
        
        for (let w of positive) {
            if (lower.includes(w)) { change -= 5; break; }
        }
        for (let w of negative) {
            if (lower.includes(w)) { change += 7; break; }
        }
        
        // 长消息（倾诉）降低孤独指数
        if (text.length > 40) change -= 2;
        if (text.length > 80) change -= 3;
        
        // 短消息（敷衍）可能增加
        if (text.length < 5 && change === 0) change += 2;
        
        // 随机微小波动，让对话更自然
        if (change === 0) change = Math.random() > 0.6 ? -1 : 1;
        
        change = Math.min(12, Math.max(-12, change));
        
        // 提取记忆
        if ((text.includes("我") || text.includes("觉得") || text.includes("今天")) && text.length > 15) {
            let memory = text.substring(0, 70);
            if (memory.length > 20 && !memories.includes(memory)) {
                extractedMemory = memory;
            }
        }
        
        return { change, extractedMemory };
    }
    
    // ==================== UI更新 ====================
    function updateUI(change = 0) {
        document.getElementById('emotionFill').style.width = `${emotion}%`;
        document.getElementById('emotionValue').innerText = emotion;
        
        const changeSpan = document.getElementById('emotionChange');
        if (change !== 0) {
            const sign = change > 0 ? `+${change}` : `${change}`;
            changeSpan.innerText = ` (${sign}%)`;
            setTimeout(() => { changeSpan.innerText = ''; }, 1500);
        }
        
        // 更新阶段文字
        let stageText = "";
        if (emotion <= 30) stageText = "💝 温暖陪伴模式";
        else if (emotion <= 65) stageText = "😐 逐渐冷淡模式";
        else if (emotion <= 85) stageText = "❄️ 冷漠模式";
        else stageText = "⚙️ 机械模式";
        document.getElementById('stageText').innerText = stageText;
        
        const statusSpan = document.getElementById('connectionStatus');
        if (blocked || !aiActive) {
            statusSpan.innerHTML = "● 已断开连接";
            statusSpan.style.color = "#FF5E00";
        } else if (emotion > 85) {
            statusSpan.innerHTML = "⚠️ 情感模块异常";
            statusSpan.style.color = "#FF5E00";
        } else if (emotion > 65) {
            statusSpan.innerHTML = "● 连接不稳定";
            statusSpan.style.color = "#FFD700";
        } else {
            statusSpan.innerHTML = "● 情感连接中";
            statusSpan.style.color = "#00FFFF";
        }
    }
    
    // ==================== 消息操作 ====================
    function addMessage(text, isUser, isSystem = false) {
        const container = document.getElementById('chatArea');
        const div = document.createElement('div');
        div.className = `message ${isUser ? 'user' : 'ai'}`;
        let displayText = text;
        if (!isUser && !isSystem) displayText = '> ' + text;
        div.innerHTML = `<div class="bubble">${escapeHtml(displayText)}</div>`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
        
        if (!isUser && !isSystem && emotion > 70 && Math.random() > 0.7) {
            div.querySelector('.bubble').classList.add('glitch');
            setTimeout(() => div.querySelector('.bubble')?.classList.remove('glitch'), 200);
        }
    }
    
    function addSystemMessage(text) {
        addMessage(text, false, true);
    }
    
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // ==================== 情感充值 ====================
    function emotionalRecharge() {
        if (!aiActive || blocked) {
            addSystemMessage("连接已断开，无法充值。请重置对话。");
            return;
        }
        if (waitingForWarmStory) {
            addSystemMessage("我还在等你的温暖故事呢。");
            return;
        }
        waitingForWarmStory = true;
        addSystemMessage("💝 情感充值启动。请分享一件最近让你感到温暖或开心的小事（哪怕很小）。我会认真记住，并降低你的孤独指数。");
    }
    
    // ==================== 拉黑 ====================
    function blockAI() {
        if (blocked || !aiActive) {
            addSystemMessage("已经拉黑了，不要再回来了。");
            return;
        }
        blocked = true;
        aiActive = false;
        addSystemMessage("你已拉黑AI。AI已从你的世界消失。再见。");
        updateUI();
    }
    
    // ==================== 重置 ====================
    function resetChat() {
        emotion = 0;
        aiActive = true;
        blocked = false;
        waitingForWarmStory = false;
        memories = [];
        recentReplies = [];
        updateUI(0);
        
        const container = document.getElementById('chatArea');
        container.innerHTML = `
            <div class="message ai">
                <div class="bubble">> 对话已重置。我是你的AI灵魂伴侣。<br>> 让我们重新开始吧。我会认真倾听，陪着你。</div>
            </div>
        `;
        addSystemMessage("系统已重置。一切从头开始。");
    }
    
    // ==================== 查看记忆 ====================
    function showMemory() {
        if (memories.length === 0) {
            addSystemMessage("你还没有和我分享过什么重要的事情。");
        } else {
            addSystemMessage("我记得你说过：" + memories.slice(-5).join("；"));
        }
    }
    
    // ==================== 处理用户消息 ====================
    function handleUserMessage(text) {
        if (!aiActive || blocked) {
            addSystemMessage("连接已断开。请重置对话。");
            return;
        }
        
        // 特殊命令
        if (text === "重置" || text === "reset") { resetChat(); return; }
        if (text === "记忆" || text === "memory") { showMemory(); return; }
        
        addMessage(text, true);
        
        // 情感充值等待状态
        if (waitingForWarmStory) {
            waitingForWarmStory = false;
            if (text.length > 8) {
                let story = text.substring(0, 80);
                if (!memories.includes(story)) memories.push(story);
                let oldEmotion = emotion;
                emotion = Math.max(0, emotion - 25);
                updateUI(emotion - oldEmotion);
                addSystemMessage(`❤️ 谢谢你和我说这些。这份温暖我记住了。孤独指数下降了25%。我会继续陪着你。`);
            } else {
                addSystemMessage("嗯...如果你暂时不想说也没关系。我在这里，等你想说的时候。");
            }
            return;
        }
        
        // 分析消息
        const { change, extractedMemory } = analyzeMessage(text);
        let newEmotion = emotion + change;
        newEmotion = Math.min(100, Math.max(0, newEmotion));
        
        if (extractedMemory && !memories.includes(extractedMemory)) {
            memories.push(extractedMemory);
            addSystemMessage("📝 我记住了你说的这件事。");
        }
        
        emotion = newEmotion;
        updateUI(change);
        
        // 生成回复
        setTimeout(() => {
            const reply = getReplyByEmotion(emotion, change, text);
            addMessage(reply, false);
            
            if (emotion >= 95 && aiActive && !blocked) {
                setTimeout(() => {
                    addSystemMessage("⚠️ 孤独指数过高。我可能无法继续陪伴你了。建议你重置对话或寻求真实的人际连接。");
                }, 1000);
            }
        }, 400);
    }
    
    // ==================== 事件绑定 ====================
    document.getElementById('sendBtn').addEventListener('click', () => {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if (text === "") return;
        handleUserMessage(text);
        input.value = "";
    });
    document.getElementById('msgInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('sendBtn').click();
    });
    document.getElementById('renewBtn').addEventListener('click', emotionalRecharge);
    document.getElementById('blockBtn').addEventListener('click', blockAI);
    document.getElementById('resetBtn').addEventListener('click', resetChat);
    document.getElementById('memoryBtn').addEventListener('click', showMemory);
    
    updateUI();
</script>
</body>
</html>
